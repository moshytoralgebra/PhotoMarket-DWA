<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoMarket — Logs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a1a2e;
    }

    /* ── Top bar ── */
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar h1 {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .btn-logout {
      padding: 0.45rem 1rem;
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-logout:hover { background: #dc2626; }

    /* ── Main content ── */
    .container {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }

    .controls label {
      font-size: 0.875rem;
      font-weight: 600;
      color: #444;
    }

    select {
      padding: 0.45rem 0.75rem;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.9375rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    select:focus { border-color: #4f46e5; }

    .btn-show {
      padding: 0.5rem 1.25rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-show:hover  { background: #4338ca; }
    .btn-show:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* ── Messages ── */
    .message {
      display: none;
      border-radius: 6px;
      padding: 0.7rem 1rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    .message.error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
    }

    .message.info {
      background: #eff6ff;
      border: 1px solid #93c5fd;
      color: #1d4ed8;
    }

    /* ── Log list ── */
    .log-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .log-item {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      padding: 0.85rem 1.1rem;
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      column-gap: 0.75rem;
      row-gap: 0.2rem;
    }

    .log-level {
      grid-row: 1 / 3;
      align-self: center;
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .level-info    { background: #dbeafe; color: #1e40af; }
    .level-warning { background: #fef9c3; color: #92400e; }
    .level-error   { background: #fee2e2; color: #991b1b; }
    .level-debug   { background: #f3f4f6; color: #374151; }
    .level-other   { background: #e5e7eb; color: #374151; }

    .log-timestamp {
      font-size: 0.75rem;
      color: #9ca3af;
      align-self: end;
    }

    .log-message {
      font-size: 0.9rem;
      color: #1f2937;
      word-break: break-word;
      align-self: start;
    }

    .empty-state {
      text-align: center;
      color: #9ca3af;
      padding: 3rem 1rem;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>Log List</h1>
    <button class="btn-logout" onclick="doLogout()">Logout</button>
  </div>

  <div class="container">
    <div class="controls">
      <label for="countSelect">Show last</label>
      <select id="countSelect">
        <option value="10">10</option>
        <option value="25">25</option>
        <option value="50">50</option>
      </select>
      <span style="font-size:0.875rem;color:#666;">logs</span>
      <button class="btn-show" id="showBtn" onclick="loadLogs()">Show Logs</button>
    </div>

    <div class="message error" id="errorMsg"></div>
    <div class="message info"  id="infoMsg"></div>

    <ul class="log-list" id="logList"></ul>
  </div>

  <script>
    // Guard: redirect to login if no token
    (function checkAuth() {
      if (!localStorage.getItem("jwt_token")) {
        window.location.href = "login.html";
      }
    })();

    function doLogout() {
      localStorage.removeItem("jwt_token");
      window.location.href = "login.html";
    }

    async function loadLogs() {
      const count = document.getElementById("countSelect").value;
      const token = localStorage.getItem("jwt_token");

      if (!token) {
        window.location.href = "login.html";
        return;
      }

      const btn = document.getElementById("showBtn");
      btn.disabled    = true;
      btn.textContent = "Loading…";

      clearMessages();
      document.getElementById("logList").innerHTML = "";

      try {
        const response = await fetch(`/api/logs/get/${count}`, {
          headers: { "Authorization": "Bearer " + token }
        });

        if (response.status === 401) {
          localStorage.removeItem("jwt_token");
          window.location.href = "login.html";
          return;
        }

        if (!response.ok) {
          const text = await response.text();
          showError("Failed to load logs: " + (text || response.statusText));
          return;
        }

        const logs = await response.json();
        renderLogs(logs);

      } catch (err) {
        showError("Network error — could not reach the server.");
      } finally {
        btn.disabled    = false;
        btn.textContent = "Show Logs";
      }
    }

    function renderLogs(logs) {
      const list = document.getElementById("logList");

      if (!logs || logs.length === 0) {
        list.innerHTML = '<li class="empty-state">No logs found.</li>';
        return;
      }

      showInfo(`Showing ${logs.length} log entr${logs.length === 1 ? "y" : "ies"}.`);

      list.innerHTML = logs.map(log => {
        const levelClass = levelCssClass(log.level);
        const ts         = formatTimestamp(log.timestamp);
        const msg        = escapeHtml(log.message);
        const lvlLabel   = escapeHtml(log.level);

        return `
          <li class="log-item">
            <span class="log-level ${levelClass}">${lvlLabel}</span>
            <span class="log-timestamp">${ts}</span>
            <span class="log-message">${msg}</span>
          </li>`;
      }).join("");
    }

    function levelCssClass(level) {
      if (!level) return "level-other";
      switch (level.toLowerCase()) {
        case "info":    return "level-info";
        case "warning":
        case "warn":    return "level-warning";
        case "error":   return "level-error";
        case "debug":   return "level-debug";
        default:        return "level-other";
      }
    }

    function formatTimestamp(raw) {
      if (!raw) return "—";
      try {
        const d = new Date(raw);
        return d.toLocaleString(undefined, {
          year:   "numeric", month:  "2-digit", day:    "2-digit",
          hour:   "2-digit", minute: "2-digit", second: "2-digit"
        });
      } catch { return raw; }
    }

    function escapeHtml(str) {
      if (!str) return "";
      return str
        .replace(/&/g,  "&amp;")
        .replace(/</g,  "&lt;")
        .replace(/>/g,  "&gt;")
        .replace(/"/g,  "&quot;");
    }

    function showError(msg) {
      const box = document.getElementById("errorMsg");
      box.textContent   = msg;
      box.style.display = "block";
    }

    function showInfo(msg) {
      const box = document.getElementById("infoMsg");
      box.textContent   = msg;
      box.style.display = "block";
    }

    function clearMessages() {
      document.getElementById("errorMsg").style.display = "none";
      document.getElementById("infoMsg").style.display  = "none";
    }
  </script>
</body>
</html>
